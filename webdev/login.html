<!DOCTYPE html>
<html lang="en">

<head>
    <title>login-personal</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body style="
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    ">
    <div class="container" style="text-align: center; width: 350px">
        <h1>my practice website</h1>
        <h3>Welcome</h3>

        <input type="email" id="email" placeholder="Email (e.g., user@test.com)" />
        <input type="password" id="pass" placeholder="Password " />

        <button onclick="handleLogin()" style="width: 100%; margin-top: 10px">
            Login
        </button>
        <button onclick="handleSignin()" style="width: 100%; margin-top: 10px">
            Signin
        </button>
        <p id="msg" style="color: red; margin-top: 10px"></p>
    </div>
    <script>
        function handleLogin() {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;
            const msg = document.getElementById("msg");

            const user = usersList.find(
                (u) => u.email === email && u.password === pass
            );

            if (user) {
                localStorage.setItem("loggedInUser", email);
                window.location.href = "products.html";

            } else {
                msg.textContent = "Invalid email or password.";
            }
        }

        function handleSignin() {
            const email = document.getElementById("email").value;
            const pass = document.getElementById("pass").value;
            const msg = document.getElementById("msg");

            const user = usersList.find(
                (u) => u.email === email && u.password === pass
            );

            if (user) {
                localStorage.setItem("loggedInUser", email);
                window.location.href = "products.html";

            } else {
                msg.textContent = "Invalid email or password.";
            }
        }
    </script>
</body>

</html>
